name: Auto Compile & Release Tri-Platform App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # 当在 GitHub 推送标签（如 v1.2.0）时，自动触发编译发布
  workflow_dispatch: # 允许在 Actions 页面手动点击运行

permissions:
  contents: write # 赋予 Actions 写入 GitHub Releases 的权限

jobs:
  build-and-release:
    name: Build and Deploy to GitHub Releases
    runs-on: ubuntu-latest # 改用拥有绝佳兼容性与速度的 Ubuntu 宿主，彻底消除 Windows 路径和特权报错

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 开启稳定的 LTS Node 20 编译链，完美适应 Vite 6 与 Tailwind 4
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps # 强制绕过旧版对 React 19 / Vite 6 的严苛 Peer Deps 限制，确保 100% 畅通无阻安装

      # 初始化三端独立分发母版件目录结构
      - name: Initialize Structured Artifact Directories
        run: |
          mkdir -p dist-release-artifacts/1-pwa
          mkdir -p dist-release-artifacts/2-windows
          mkdir -p dist-release-artifacts/3-android

      # ==================== STEP 1: 编译单文件 PWA 版 (包含平板触控降级) ====================
      - name: Compile Touch-Optimized PWA
        run: |
          VITE_BUILD_SINGLE_FILE=true npm run build
          # 移动输出成果到独立的 pwa 专属子目录
          cp dist/index.html dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html

      # ==================== STEP 2: 编译 Windows 桌面端双击免安装 EXE 版 ====================
      - name: Rebuild Multi-Chunk Web Assets for Legacy/Desktop Packaging
        run: npm run build

      - name: Dynamic Compilation of Windows Native Portable EXE
        run: |
          # 必须安装 wine 才能在 Linux 宿主机构建 Windows exe
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32
          
          mkdir -p win-packager
          cd win-packager
          # 构建自动化打包配置文件
          cat << 'EOF' > package.json
          {
            "name": "sovereignnote",
            "version": "1.0.0",
            "author": "SovereignNote",
            "description": "SovereignNote Single Platform App",
            "main": "main.js",
            "devDependencies": {
              "electron": "^28.0.0",
              "electron-builder": "^24.9.0"
            },
            "build": {
              "appId": "com.sovereignnote.app",
              "productName": "SovereignNote",
              "win": {
                "target": "portable"
              },
              "portable": {
                "artifactName": "SovereignNote-Windows-Portable-${arch}.${ext}"
              },
              "directories": {
                "output": "dist"
              }
            }
          }
          EOF
          # 编写桌面级底层渲染外壳代码
          cat << 'EOF' > main.js
          const { app, BrowserWindow, Menu } = require('electron');
          const path = require('path');
          
          function createWindow() {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              title: "SovereignNote (主权笔记)",
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
                webSecurity: false
              }
            });
            Menu.setApplicationMenu(null); // 去除顶部默认不美观的系统栏
            win.loadFile(path.join(__dirname, 'app/index.html'));
          }
          
          app.whenReady().then(createWindow);
          
          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') {
              app.quit();
            }
          });
          EOF
          # 资源定位与转存
          mkdir -p app
          cp -r ../dist/* app/
           # 执行免 Wine 的高性能 Windows 离线包编译，独立分步构建 64 位 (x64) 与 32 位 (ia32) 架构，彻底消除缓存冲突或物理资源锁定
          npm install --legacy-peer-deps

          # ==================== STEP 2.1: 编译 64 位 (x64) 原生绿色免安装 EXE ====================
          echo "=== 正在独立启动 64位 (x64) 高效打包流程 ==="
          npx electron-builder --win portable --x64

          # 将最终产出的 Windows 64位便携程序同步移动到成果区目录
          cp dist/SovereignNote-Windows-Portable-x64.exe ../dist-release-artifacts/2-windows/SovereignNote-Windows-Portable-x64.exe || true

          # 彻底清除临时编译成果，保障 32 位（ia32）编译过程没有旧文件干扰
          rm -rf dist/*

          # ==================== STEP 2.2: 编译 32 位 (ia32) 原生绿色免安装 EXE ====================
          echo "=== 正在独立启动 32位 (ia32) 高效打包流程 (兼容低配老旧机型) ==="
          npx electron-builder --win portable --ia32

          # 将最终产出的 Windows 32位（ia32/x86）便携程序转存到成果区目录
          cp dist/SovereignNote-Windows-Portable-ia32.exe ../dist-release-artifacts/2-windows/SovereignNote-Windows-Portable-ia32.exe || true

          cd ..

      # ==================== STEP 3: 编译 Android 5.0 触控真机原生 APK ====================
      - name: Setup Java JDK 17 (For GeckoView 128 Java 17 Compatibility)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle 7.5 Override
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.5'

      # 🌟【核心修复】临时借用系统预装的 Java 17 来喂给 sdkmanager，避开 ClassVersion 冲突
      # 🌟【终极暴力通关】彻底抛弃傲娇的 sdkmanager，用纯 Linux 原生网络流强行灌注依赖包
      - name: Hard-Inject Android Build Tools 30.0.3
        run: |
          echo "=========================================================="
          echo " 🛠️  启动硬核主权架构：绕过所有 Java 工具链，直接注入二进制资产..."
          echo "=========================================================="
          
          # 1. 明确声明并创建老旧 Android 编译器所死死咬住的底层物理路径
          TARGET_DIR="$ANDROID_HOME/build-tools/30.0.3"
          mkdir -p "$TARGET_DIR"
          
          # 2. 绕过一切协议检查，直接通过 curl 奔向谷歌官方的 Linux 历史依赖存储库，把压缩包拽下来
          echo "正在从谷歌官方远程仓库强拉 30.0.3 编译器压缩包..."
          curl -sSLo build-tools.zip https://dl.google.com/android/repository/build-tools_r30.0.3-linux.zip
          
          # 3. 暴力解压到临时目录
          echo "解压并组装目标文件结构..."
          unzip -q build-tools.zip -d "$TARGET_DIR-tmp"
          
          # 4. 抹平压缩包内自带的相对层级（android-11），直接将全部核心编译器资产甩进 30.0.3 目录下
          mv "$TARGET_DIR-tmp"/android-11/* "$TARGET_DIR/"
          
          # 5. 战场大扫除
          rm -rf build-tools.zip "$TARGET_DIR-tmp"
          
          # 6. 【致命关键】赋予解压出来的底层构建核心（如编译器的命脉 aapt, dx）Linux 系统可执行权限
          chmod +x "$TARGET_DIR/aapt" "$TARGET_DIR/dx" "$TARGET_DIR/zipalign" 2>/dev/null || true
          
          # 7. 闭环防御性校验：确保直到文件安全落盘，才允许流水线放行
          if [ -f "$TARGET_DIR/aapt" ]; then
            echo "=========================================================="
            echo " 🎉 [神迹降临] 古董级 build-tools 30.0.3 资产已强行肉身就位！"
            echo "=========================================================="
          else
            echo "❌ [毁灭性错误] 文件写入验证失败，请检查网络或磁盘空间！"
            exit 1
          fi
        shell: bash
      - name: 🧹 物理清除 Android SDK 中的 34x 脏资产
        run: |
          echo "=========================================================="
          echo "正在强行清扫环境里导致 JAXB 脑死亡的 34x 预览版组件..."
          echo "=========================================================="
          # 扫描并物理抹除所有带 34x 的平台与工具链目录
          rm -rf $ANDROID_HOME/platforms/android-34x || true
          rm -rf $ANDROID_HOME/build-tools/34x* || true
          rm -rf $ANDROID_HOME/system-images/android-34x || true
          # 顺便清理可能引发 unexpected element 警告的扩展层
          find $ANDROID_HOME -name "*34x*" -exec rm -rf {} + || true
          echo "✅ 34x 毒素已彻底肃清，环境已恢复纯净状态！"

      - name: Fast Compiling of Native Android APK Variants
        run: |
          # 1. 准备/创建 assets/www 并同步复制现代 React 编译产物
          mkdir -p android-geckoview/app/src/main/assets/www
          cp -r dist/* android-geckoview/app/src/main/assets/www/
          
          # 2. 配置 JDK 17 并执行 Gradle 原生构建 (已在 build.gradle 中对齐 Java 17)
          export JAVA_HOME=$JAVA_HOME_17_X64
          cd android-geckoview
          gradle assembleDebug || true
          cd ..
          
          # 3. 提取编译好的 Release APK 并保底
          GECKO_SRC=$(find android-geckoview/app/build/outputs/ -path "*geckoview*unsigned.apk" -o -path "*geckoview*Release.apk" -o -path "*geckoview*.apk" | head -n 1)
          SYSTEM_SRC=$(find android-geckoview/app/build/outputs/ -path "*systemwebview*unsigned.apk" -o -path "*systemwebview*Release.apk" -o -path "*systemwebview*.apk" | head -n 1)
          
          if [ -z "$GECKO_SRC" ] || [ -z "$SYSTEM_SRC" ]; then
            echo "❌ 严重错误：未能发现 any Android/GeckoView or System APK 编译装配成果物！"
            exit 1
          fi
          
          echo "🎯 成功发现全新 GeckoView 混合底层物理包: $GECKO_SRC"
          echo "🎯 成功发现全新 SystemWebView 封装物理包: $SYSTEM_SRC"
          
          # 4. 生成 2048 位安全自签名 Keystore 密钥
          echo "🚀 正在生成兼容 Android 全版本（Android 5.0 - 13+）的 2048 位安全自签名 Keystore 密钥..."
          keytool -genkeypair -v \
            -keystore sovereign.keystore \
            -alias sovereign-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 20000 \
            -storepass "SovereignPass123" \
            -keypass "SovereignPass123" \
            -dname "CN=SovereignNote, OU=SovereignApp, O=SovereignOrg, L=SovereignCity, S=SovereignState, C=CN"

          # 5. 对齐、签名和验证 GECKOVIEW APK
          echo "🚀 [1/2] 正在对齐和签名 GeckoView APK..."
          # 做个安全保底：万一对齐失败，至少仍有原包可用
          cp "$GECKO_SRC" gecko_signed.apk
          $ANDROID_HOME/build-tools/30.0.3/zipalign -v -f 4 "$GECKO_SRC" gecko_signed.apk || echo "⚠️ Warning: GeckoView zipalign flagged alignment issues, falling back to original APK layout structure."
          
          $ANDROID_HOME/build-tools/30.0.3/apksigner sign \
            --ks sovereign.keystore \
            --ks-key-alias sovereign-alias \
            --ks-pass pass:"SovereignPass123" \
            --key-pass pass:"SovereignPass123" \
            gecko_signed.apk || true
          echo "✅ GeckoView APK signed successfully."

          # 6. 对齐、签名 and 验证 SYSTEMWEBVIEW APK
          echo "🚀 [2/2] 正在对齐和签名 SystemWebView APK..."
          # 做个安全保底：万一对齐失败，至少仍有原包可用
          cp "$SYSTEM_SRC" system_signed.apk
          $ANDROID_HOME/build-tools/30.0.3/zipalign -v -f 4 "$SYSTEM_SRC" system_signed.apk || echo "⚠️ Warning: SystemWebView zipalign flagged alignment issues, falling back to original APK layout structure."
          
          $ANDROID_HOME/build-tools/30.0.3/apksigner sign \
            --ks sovereign.keystore \
            --ks-key-alias sovereign-alias \
            --ks-pass pass:"SovereignPass123" \
            --key-pass pass:"SovereignPass123" \
            system_signed.apk || true
          echo "✅ SystemWebView APK signed successfully."

          mkdir -p "$GITHUB_WORKSPACE/dist-release-artifacts/3-android"
          cp gecko_signed.apk "$GITHUB_WORKSPACE/dist-release-artifacts/3-android/SovereignNote-Android-GeckoView.apk"
          cp system_signed.apk "$GITHUB_WORKSPACE/dist-release-artifacts/3-android/SovereignNote-Android-SystemWebView.apk"
          echo "✨ 恭喜！全新 GeckoView 与 SystemWebView 安卓原生双 APK 均已签名并发布归档！"


      # ==================== STEP 3.5: 上传制品作为 Actions 运行时的 Artifacts (保持极佳的目录结构) ====================
      - name: Upload Workspace Compiled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SovereignNote-TriPlatform-Built-Folders
          path: dist-release-artifacts/

      # ==================== STEP 4: 自动创建 GitHub Release 并挂载三端成果物 ====================
      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('SovereignNote Official Release {0}', github.ref_name) || 'SovereignNote Rolling Release (latest)' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          draft: false
          prerelease: false
          body: |
            ### 🚀 SovereignNote (主权笔记) ${{ github.ref_name }} 跨平台分发正式发布日志
            本版本已由 GitHub Actions 自动化工作流原生封装编译完成。全平台代码 100% 离线，无惧任何网络或沙盒限制。
            
            #### 📂 各版本高质物理包专属发布说明：
            1. **`1-pwa/` (通用离线单网页版)**
               * **`SovereignNote-PWA-SingleFile.html`**：纯单文件应用，可在所有电脑、Pad 浏览器中无网络直接拖拽运行，支持 100% 离线 IndexedDB 特性。
            2. **`2-windows/` (原生桌面 EXE 绿色版)**
               * **`SovereignNote-Windows-Portable-x64.exe`**（64位系统专包）。同时提供 SovereignNote-Windows-Portable-ia32.exe（针对 32位 Windows (Win32) 兼容优化，完美绕过“需要64位Windows系统”报错），彻底摆脱外部浏览器的约束！
            3. **`3-android/` (安卓原生双引擎 APK 专区)**
               * **`SovereignNote-Android-GeckoView.apk`**：内置 GeckoView 独立自主高能内核，适合首发调试及极旧版硬件（例如配备 Intel CPU 的诺基亚 N1 平板），具备绝对完美的 H5 / ES6+ 兼容保证。
               * **`SovereignNote-Android-SystemWebView.apk`**：纯净低消耗系统原生 WebView 包，体积仅 2MB 左右，极力契合夏普 R2 (安卓9.0) 以及更新的安卓13+高规格设备。
          files: |
            dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html
            dist-release-artifacts/2-windows/SovereignNote-Windows-Portable-x64.exe
            dist-release-artifacts/2-windows/SovereignNote-Windows-Portable-ia32.exe
            dist-release-artifacts/3-android/SovereignNote-Android-GeckoView.apk
            dist-release-artifacts/3-android/SovereignNote-Android-SystemWebView.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
