name: Auto Compile & Release Tri-Platform App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # 当在 GitHub 推送标签（如 v1.2.0）时，自动触发编译发布
  workflow_dispatch: # 允许在 Actions 页面手动点击运行

permissions:
  contents: write # 赋予 Actions 写入 GitHub Releases 的权限

jobs:
  build-and-release:
    name: Build and Deploy to GitHub Releases
    runs-on: ubuntu-latest # 改用拥有绝佳兼容性与速度的 Ubuntu 宿主，彻底消除 Windows 路径和特权报错

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 开启稳定的 LTS Node 20 编译链，完美适应 Vite 6 与 Tailwind 4
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps # 强制绕过旧版对 React 19 / Vite 6 的严苛 Peer Deps 限制，确保 100% 畅通无阻安装

      # 初始化三端独立分发母版件目录结构
      - name: Initialize Structured Artifact Directories
        run: |
          mkdir -p dist-release-artifacts/1-pwa
          mkdir -p dist-release-artifacts/2-windows
          mkdir -p dist-release-artifacts/3-android

      # ==================== STEP 1: 编译单文件 PWA 版 (包含平板触控降级) ====================
      - name: Compile Touch-Optimized PWA
        run: |
          npm run build
          # 移动输出成果到独立的 pwa 专属子目录
          cp dist/index.html dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html

      # ==================== STEP 2: 编译 Windows 桌面端双击免安装 EXE 版 ====================
      - name: Dynamic Compilation of Windows Native Portable EXE
        run: |
          # 必须安装 wine 才能在 Linux 宿主机构建 Windows exe
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32
          
          mkdir -p win-packager
          cd win-packager
          # 构建自动化打包配置文件
          cat << 'EOF' > package.json
          {
            "name": "sovereignnote",
            "version": "1.0.0",
            "author": "SovereignNote",
            "description": "SovereignNote Single Platform App",
            "main": "main.js",
            "devDependencies": {
              "electron": "^28.0.0",
              "electron-builder": "^24.9.0"
            },
            "build": {
              "appId": "com.sovereignnote.app",
              "productName": "SovereignNote",
              "win": {
                "target": "portable"
              },
              "directories": {
                "output": "dist"
              }
            }
          }
          EOF
          # 编写桌面级底层渲染外壳代码
          cat << 'EOF' > main.js
          const { app, BrowserWindow, Menu } = require('electron');
          const path = require('path');
          
          function createWindow() {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              title: "SovereignNote (主权笔记)",
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true
              }
            });
            Menu.setApplicationMenu(null); // 去除顶部默认不美观的系统栏
            win.loadFile(path.join(__dirname, 'app/SovereignNote-PWA-SingleFile.html'));
          }
          
          app.whenReady().then(createWindow);
          
          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') {
              app.quit();
            }
          });
          EOF
          # 资源定位与转存
          mkdir -p app
          cp ../dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html app/SovereignNote-PWA-SingleFile.html
          # 执行免 Wine 的高性能 Windows 离线包编译
          npm install --legacy-peer-deps
          npx electron-builder --win portable
          # 将最终产出的 Windows 标准绿化便携可执行程序同步到总成果区
          cp dist/SovereignNote*.exe ../dist-release-artifacts/2-windows/SovereignNote-Windows-Portable.exe
          cd ..

      # ==================== STEP 3: 编译 Android 5.0 触控真机原生 APK ====================
      - name: Setup Java JDK 11 (For Android 5.0 Legacy Target)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # 配合 config.xml 里的降级规范，锁死 JDK 11

      - name: Setup Gradle 7.4.2 Override
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.4.2' # 降级 Gradle 内核，给老项目提供 XmlParser 支持

      # 🌟【核心修复】临时借用系统预装的 Java 17 来喂给 sdkmanager，避开 ClassVersion 冲突
      - name: Install Exact Android Build Tools 30.0.3
        run: |
          echo "正在为系统补齐 Android Build Tools 30.0.3..."
          
          # 动态寻找 GitHub 虚拟机中预装的 Java 17 或 21 的路径
          # GitHub 默认在 /opt/hostedtoolcache/Java_Zulu_jdk/ 下留有高版本备份
          JAVA_17_PATH=$(ls -d /opt/hostedtoolcache/Java_Zulu_jdk/17.* 2>/dev/null | head -n 1)/x64/bin/java
          
          # 如果找不到预装的，直接用系统默认的高版本系统软链接
          if [ ! -f "$JAVA_17_PATH" ]; then
            JAVA_17_PATH="/usr/bin/java"
          fi
          
          echo "🎯 临时调用的 Java 运行路径为: $JAVA_17_PATH"
          
          # 【精髓所在】通过 JAVACMD 环境变量，强行让 sdkmanager 独立运行在现代 Java 环境下
          # 这样既能让工具顺利运行，又绝对不会污染后续 Cordova 所需的全局 Java 11 环境
          export JAVACMD="$JAVA_17_PATH"
          
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;30.0.3"
          echo "✨ Build Tools 30.0.3 补齐成功！"
        shell: bash

      - name: Fast Compiling of Native Android APK for 旧平板 (Cordova)
        run: |
          # 1. 部署 Cordova 跨平台原生打包编译引擎
          sudo npm install -g cordova
          
          # 2. 在动作容器内瞬间生成全新 Android 工程结构
          cordova create android-project com.sovereignnote.app SovereignNote
          cd android-project
          
          # 3. 将高兼容性离线主程序同步到宿主 Android 的 www 文件夹下
          rm -rf www/*
          cp ../dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html www/index.html
          
          # 4. 配置 Cordova 在旧版 Android 平板中的流畅触控和全屏渲染设置
          sed -i 's|</widget>|    <preference name="DisallowOverscroll" value="true" />\n    <preference name="Fullscreen" value="false" />\n    <preference name="BackgroundColor" value="#0f172a" />\n    <preference name="android-minSdkVersion" value="21" />\n    <preference name="android-targetSdkVersion" value="30" />\n    <preference name="GradleVersion" value="7.4.2" />\n</widget>|' config.xml
          
          # 5. 安装 Android 构建底座并在 GitHub Actions 中载入 Android 模块
          cordova platform add android@10.1.2 --save
          
          # 6. 配置底层 Android 工程使其强制兼容 Java 8
          echo "android { compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 } }" > platforms/android/app/build-extras.gradle
          
          # 7. 让 Cordova 自己处理 Gradle 的下载与初始化并进行编译
          export CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL="https://services.gradle.org/distributions/gradle-7.4.2-all.zip"
          export JAVA_HOME=$JAVA_HOME_11_X64
          cordova build android --release --verbose
          
          # 8. 编译完成后，动态寻找编译出来的 APK 文件并复制到预设的成果物收集区
          echo "正在搜寻 Cordova 编译完毕的 APK 安装包..."
          APK_SRC=$(find platforms/android/app/build/outputs/apk/release/ -name "*-release-unsigned.apk" -o -name "*-release.apk" | head -n 1)
          
          if [ -z "$APK_SRC" ]; then
            echo "❌ 严重错误：Cordova 未能成功产出 APK 文件！"
            exit 1
          fi
          
          # 强制拷贝到最初在根目录创建的发布产物区
          cp "$APK_SRC" "$GITHUB_WORKSPACE/dist-release-artifacts/3-android/SovereignNote-Android5.0-Tablet.apk"
          echo "✨ APK 成功由 Cordova 引擎编译并归档！"

      # ==================== STEP 3.5: 上传制品作为 Actions 运行时的 Artifacts (保持极佳的目录结构) ====================
      - name: Upload Workspace Compiled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SovereignNote-TriPlatform-Built-Folders
          path: dist-release-artifacts/

      # ==================== STEP 4: 自动创建 GitHub Release 并挂载三端成果物 ====================
      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('SovereignNote Official Release {0}', github.ref_name) || 'SovereignNote Rolling Release (latest)' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          draft: false
          prerelease: false
          body: |
            ### 🚀 SovereignNote (主权笔记) ${{ github.ref_name }} 跨平台分发正式发布日志
            本版本已由 GitHub Actions 自动化工作流原生封装编译完成。全平台代码 100% 离线，无惧任何网络或沙盒限制。
            
            #### 📂 各版本高质物理包专属发布说明：
            1. **`1-pwa/` (通用离线单网页版)**
               * **`SovereignNote-PWA-SingleFile.html`**：纯单文件应用，可在所有电脑、Pad 浏览器中无网络直接拖拽运行，支持 100% 离线 IndexedDB 特性。
            2. **`2-windows/` (原生桌面 EXE 绿色版)**
               * **`SovereignNote-Windows-Portable.exe`**：利用高性能 Electron 原生 WebView 封装构建的免安装、双击直接独立窗口运行的 Windows 真机 Portable EXE，彻底摆脱外部浏览器的约束！
            3. **`3-android/` (安卓5.0+ 经典平板原生 APK 版)**
               * **`SovereignNote-Android5.0-Tablet.apk`**：专为经典旧版安卓平板（Android 5.0+ / 5.1 / 6.0 等）转译优化的原生 Cordova WebView 封装 APK，免证书、免 https 强制校验，完美抵消 300ms 点击判定延迟，性能非凡。
          files: |
            dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html
            dist-release-artifacts/2-windows/SovereignNote-Windows-Portable.exe
            dist-release-artifacts/3-android/SovereignNote-Android5.0-Tablet.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
