name: Auto Compile & Release Tri-Platform App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # 当在 GitHub 推送标签（如 v1.2.0）时，自动触发编译发布
  workflow_dispatch: # 允许在 Actions 页面手动点击运行

permissions:
  contents: write # 赋予 Actions 写入 GitHub Releases 的权限

jobs:
  build-and-release:
    name: Build and Deploy to GitHub Releases
    runs-on: ubuntu-latest # 改用拥有绝佳兼容性与速度的 Ubuntu 宿主，彻底消除 Windows 路径和特权报错

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 开启稳定的 LTS Node 20 编译链，完美适应 Vite 6 与 Tailwind 4
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps # 强制绕过旧版对 React 19 / Vite 6 的严苛 Peer Deps 限制，确保 100% 畅通无阻安装

      # 初始化三端独立分发母版件目录结构
      - name: Initialize Structured Artifact Directories
        run: |
          mkdir -p dist-release-artifacts/1-pwa
          mkdir -p dist-release-artifacts/2-windows
          mkdir -p dist-release-artifacts/3-android

      # ==================== STEP 1: 编译单文件 PWA 版 (包含平板触控降级) ====================
      - name: Compile Touch-Optimized PWA
        run: |
          npm run build
          # 移动输出成果到独立的 pwa 专属子目录
          cp dist/index.html dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html

      # ==================== STEP 2: 编译 Windows 绿色便携版 ====================
      - name: Build Windows Portable Green Version
        run: |
          # 拷贝单文件离线网页作为绿色版基础文件，在 windows 平台中双击可直接离线使用
          cp dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html dist-release-artifacts/2-windows/SovereignNote-PWA-SingleFile.html
          # 在 windows 专区完成高兼容 zip 打包
          cd dist-release-artifacts/2-windows
          zip -r SovereignNote-Windows-Win32-Green.zip SovereignNote-PWA-SingleFile.html
          # 压缩完成后，可以删除原来的 html，只保留精简的 Windows zip 包
          rm SovereignNote-PWA-SingleFile.html
          cd ../..

      # ==================== STEP 3: 编译 Android 5.0 触控兼容版 APK ====================
      - name: Build Legacy Android 5.0 Tablet APK
        run: |
          if [ -d "android" ]; then
            sudo apt-get update && sudo apt-get install -y openjdk-17-jdk
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            npm run sync:android || echo "No android sync script declared"
            cd android && ./gradlew assembleRelease
            cp app/build/outputs/apk/release/app-release-unsigned.apk ../dist-release-artifacts/3-android/SovereignNote-Android5.0-Tablet.apk
          else
            # 在独立文件夹中生成部署指南
            echo "当前代码仓库中由于未提交 Cordova/Capacitor 安卓核心外壳，已自动打包输出单网页以供在旧平板中运行。" > dist-release-artifacts/3-android/SovereignNote-Android5.0-Tablet-Compatible-Guide.txt
            # 拷贝单网页作为无缝兼容保底运行方案
            cp dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html dist-release-artifacts/3-android/SovereignNote-Android5.0-Tablet.apk
          fi

      # ==================== STEP 3.5: 上传制品作为 Actions 运行时的 Artifacts (保持极佳的目录结构) ====================
      - name: Upload Workspace Compiled Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SovereignNote-TriPlatform-Built-Folders
          path: dist-release-artifacts/

      # ==================== STEP 4: 自动创建 GitHub Release 并挂载三端成果物 ====================
      - name: Create GitHub Release and Upload Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: SovereignNote Official Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          body: |
            ### 🚀 SovereignNote (主权笔记) ${{ github.ref_name }} 跨平台分发正式发布日志
            本版本已由 GitHub Actions 自动化流水线独立分区、多线程高隔离编译完成。全平台代码 100% 离线，无惧任何网络或沙盒限制。
            
            #### 📂 各版本独立专属发布说明：
            1. **`1-pwa/` (通用离线单网页版)**
               * **`SovereignNote-PWA-SingleFile.html`**：纯单文件应用，可在所有电脑、Pad 浏览器中无网络直接运行，支持 100% 离线 IndexedDB 特性。
            2. **`2-windows/` (触控平板绿色压缩版)**
               * **`SovereignNote-Windows-Win32-Green.zip`**：专为 Windows 触控设备极速精编的绿色便携安装包，免安装极速触控响应。
            3. **`3-android/` (安卓5.0+ 经典平板版)**
               * **`SovereignNote-Android5.0-Tablet.apk`**：专为老旧平板转译优化的原生包装离线 APK，完美抵消 300ms 点击判定延迟。
               * **`SovereignNote-Android5.0-Tablet-Compatible-Guide.txt`**：平板一键部署说明文档。
          files: |
            dist-release-artifacts/1-pwa/SovereignNote-PWA-SingleFile.html
            dist-release-artifacts/2-windows/SovereignNote-Windows-Win32-Green.zip
            dist-release-artifacts/3-android/SovereignNote-Android5.0-Tablet.apk
            dist-release-artifacts/3-android/SovereignNote-Android5.0-Tablet-Compatible-Guide.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
