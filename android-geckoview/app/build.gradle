apply plugin: 'com.android.application'

repositories {
    maven {
        url "https://maven.mozilla.org/maven2/"
        metadataSources {
            mavenPom()
            artifact()
        }
    }
    google()
    maven { url "https://maven.aliyun.com/repository/google" }
    maven { url "https://maven.aliyun.com/repository/public" }
    mavenCentral()
}

android {
    compileSdkVersion 33
    buildToolsVersion "30.0.3"

    defaultConfig {
        applicationId "com.sovereignnote.core"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 5
        versionName "1.4.1"
        multiDexEnabled true

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    flavorDimensions "engine", "device"
    productFlavors {
        geckoview {
            dimension "engine"
            applicationIdSuffix ".geckoview"
        }
        systemwebview {
            dimension "engine"
            applicationIdSuffix ".systemwebview"
        }
        
        modern64 {
            dimension "device"
            targetSdkVersion 33
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        sharp {
            dimension "device"
            targetSdkVersion 28
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        legacy32 {
            dimension "device"
            targetSdkVersion 23
            ndk {
                abiFilters "armeabi-v7a"
            }
        }
        nokia {
            dimension "device"
            targetSdkVersion 22
            ndk {
                abiFilters "x86"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    
    // GeckoView 115 targeted support mapped specifically to each flavor configuration.
    // We add them to general implementation first with a custom 'targetFlavor' extension flag,
    // then dispatch them to the correct dynamically created configurations in afterEvaluate.
    implementation('org.mozilla.geckoview:geckoview-arm64-v8a:115.0.20230710165010@aar') { ext.targetFlavor = 'geckoviewModern64' }
    implementation('org.mozilla.geckoview:geckoview-arm64-v8a:115.0.20230710165010@aar') { ext.targetFlavor = 'geckoviewSharp' }
    implementation('org.mozilla.geckoview:geckoview-armeabi-v7a:115.0.20230710165010@aar') { ext.targetFlavor = 'geckoviewLegacy32' }
    implementation('org.mozilla.geckoview:geckoview-x86:115.0.20230710165010@aar') { ext.targetFlavor = 'geckoviewNokia' }
}

// Waiting for all product flavors/configurations to be modeled, then dispatch the dependencies
project.afterEvaluate {
    def globalImpl = configurations.getByName("implementation")
    
    // Find all GeckoView dependencies containing our targetFlavor tag
    def gvDependencies = globalImpl.dependencies.findAll { dep ->
        dep.hasProperty('ext') && dep.ext.has('targetFlavor')
    }
    
    gvDependencies.each { dep ->
        def targetConfigName = "${dep.ext.targetFlavor}Implementation"
        def targetConfig = configurations.findByName(targetConfigName)
        
        if (targetConfig != null) {
            targetConfig.dependencies.add(dep)
        }
    }
    
    // Remove the dispatched dependencies from the global implementation configuration
    // to prevent architecture pollution and layout-level capability resolution conflicts.
    globalImpl.dependencies.removeAll(gvDependencies)
}

// Double-layer insurance: Register a global capability resolution strategy to resolve any potential conflict on 'org.mozilla.geckoview:geckoview'
configurations.all {
    resolutionStrategy {
        capabilitiesResolution {
            withCapability("org.mozilla.geckoview:geckoview") {
                select(candidates.first())
            }
        }
    }
}
