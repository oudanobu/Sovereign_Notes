apply plugin: 'com.android.application'

repositories {
    maven {
        url "https://maven.mozilla.org/maven2/"
        metadataSources {
            mavenPom()
            artifact()
        }
    }
    google()
    maven { url "https://maven.aliyun.com/repository/google" }
    maven { url "https://maven.aliyun.com/repository/public" }
    mavenCentral()
}

android {
    compileSdkVersion 33
    buildToolsVersion "30.0.3"

    defaultConfig {
        applicationId "com.sovereignnote.core"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 6
        versionName "1.5.0"
        multiDexEnabled true

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    flavorDimensions "channel"
    productFlavors {
        modernAndroid13 {
            dimension "channel"
            applicationIdSuffix ".modern13"
            targetSdkVersion 33
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        sharpR2 {
            dimension "channel"
            applicationIdSuffix ".sharp"
            targetSdkVersion 28
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        legacyAndroid6 {
            dimension "channel"
            applicationIdSuffix ".legacy"
            targetSdkVersion 23
            ndk {
                abiFilters "armeabi-v7a"
            }
        }
        nokiaN1 {
            dimension "channel"
            applicationIdSuffix ".nokia"
            targetSdkVersion 22
            ndk {
                abiFilters "x86"
            }
        }
    }

    sourceSets {
        modernAndroid13 {
            java.srcDirs = ['src/geckoview/java']
            res.srcDirs = ['src/geckoview/res']
        }
        sharpR2 {
            java.srcDirs = ['src/geckoview/java']
            res.srcDirs = ['src/geckoview/res']
        }
        legacyAndroid6 {
            java.srcDirs = ['src/geckoview/java']
            res.srcDirs = ['src/geckoview/res']
        }
        nokiaN1 {
            java.srcDirs = ['src/geckoview/java']
            res.srcDirs = ['src/geckoview/res']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
}

// Event-driven configuration mapping to ensure both compiler (CompileClasspath) and packager (RuntimeClasspath and Implementation) receive targeted GeckoView v130 architectures
configurations.all { configuration ->
    def configName = configuration.name
    
    if (configName.equalsIgnoreCase("modernAndroid13Implementation") || 
        configName.equalsIgnoreCase("modernAndroid13CompileClasspath") ||
        configName.equalsIgnoreCase("modernAndroid13RuntimeClasspath")) {
        project.dependencies.add(configName, 'org.mozilla.geckoview:geckoview-arm64-v8a:130.0.20240829141703')
    }
    
    if (configName.equalsIgnoreCase("sharpR2Implementation") || 
        configName.equalsIgnoreCase("sharpR2CompileClasspath") ||
        configName.equalsIgnoreCase("sharpR2RuntimeClasspath")) {
        project.dependencies.add(configName, 'org.mozilla.geckoview:geckoview-arm64-v8a:130.0.20240829141703')
    }
    
    if (configName.equalsIgnoreCase("legacyAndroid6Implementation") || 
        configName.equalsIgnoreCase("legacyAndroid6CompileClasspath") ||
        configName.equalsIgnoreCase("legacyAndroid6RuntimeClasspath")) {
        project.dependencies.add(configName, 'org.mozilla.geckoview:geckoview-armeabi-v7a:130.0.20240829141703')
    }
    
    if (configName.equalsIgnoreCase("nokiaN1Implementation") || 
        configName.equalsIgnoreCase("nokiaN1CompileClasspath") ||
        configName.equalsIgnoreCase("nokiaN1RuntimeClasspath")) {
        project.dependencies.add(configName, 'org.mozilla.geckoview:geckoview-x86:130.0.20240829141703')
    }

    configuration.resolutionStrategy {
        capabilitiesResolution {
            withCapability("org.mozilla.geckoview:geckoview") {
                select(candidates.first())
            }
        }
    }
}
