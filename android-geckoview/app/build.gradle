apply plugin: 'com.android.application'

repositories {
    maven {
        url "https://maven.mozilla.org/maven2/"
        metadataSources {
            mavenPom()
            artifact()
        }
    }
    google()
    maven { url "https://maven.aliyun.com/repository/google" }
    maven { url "https://maven.aliyun.com/repository/public" }
    mavenCentral()
}

android {
    compileSdkVersion 33
    buildToolsVersion "30.0.3"

    defaultConfig {
        applicationId "com.sovereignnote.core"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 5
        versionName "1.4.1"
        multiDexEnabled true

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    flavorDimensions "engine", "device"
    productFlavors {
        geckoview {
            dimension "engine"
            applicationIdSuffix ".geckoview"
        }
        systemwebview {
            dimension "engine"
            applicationIdSuffix ".systemwebview"
        }
        
        modern64 {
            dimension "device"
            targetSdkVersion 33
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        sharp {
            dimension "device"
            targetSdkVersion 28
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        legacy32 {
            dimension "device"
            targetSdkVersion 23
            ndk {
                abiFilters "armeabi-v7a"
            }
        }
        nokia {
            dimension "device"
            targetSdkVersion 22
            ndk {
                abiFilters "x86"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
}

// Event-driven configuration mapping to ensure both compiler (CompileClasspath) and packager (RuntimeClasspath and Implementation) receive targeted GeckoView architectures
configurations.all { configuration ->
    def configName = configuration.name
    
    if (configName.equalsIgnoreCase("geckoviewModern64Implementation") || 
        configName.equalsIgnoreCase("geckoviewModern64CompileClasspath") ||
        configName.equalsIgnoreCase("geckoviewModern64RuntimeClasspath")) {
        project.dependencies.add(configName, 'org.mozilla.geckoview:geckoview-arm64-v8a:115.0.20230710165010')
    }
    
    if (configName.equalsIgnoreCase("geckoviewSharpImplementation") || 
        configName.equalsIgnoreCase("geckoviewSharpCompileClasspath") ||
        configName.equalsIgnoreCase("geckoviewSharpRuntimeClasspath")) {
        project.dependencies.add(configName, 'org.mozilla.geckoview:geckoview-arm64-v8a:115.0.20230710165010')
    }
    
    if (configName.equalsIgnoreCase("geckoviewLegacy32Implementation") || 
        configName.equalsIgnoreCase("geckoviewLegacy32CompileClasspath") ||
        configName.equalsIgnoreCase("geckoviewLegacy32RuntimeClasspath")) {
        project.dependencies.add(configName, 'org.mozilla.geckoview:geckoview-armeabi-v7a:115.0.20230710165010')
    }
    
    if (configName.equalsIgnoreCase("geckoviewNokiaImplementation") || 
        configName.equalsIgnoreCase("geckoviewNokiaCompileClasspath") ||
        configName.equalsIgnoreCase("geckoviewNokiaRuntimeClasspath")) {
        project.dependencies.add(configName, 'org.mozilla.geckoview:geckoview-x86:115.0.20230710165010')
    }

    configuration.resolutionStrategy {
        capabilitiesResolution {
            withCapability("org.mozilla.geckoview:geckoview") {
                select(candidates.first())
            }
        }
    }
}
