apply plugin: 'com.android.application'

repositories {
    maven {
        url "https://maven.mozilla.org/maven2/"
        metadataSources {
            mavenPom()
            artifact()
        }
    }
    google()
    maven { url "https://maven.aliyun.com/repository/google" }
    maven { url "https://maven.aliyun.com/repository/public" }
    mavenCentral()
}

android {
    compileSdkVersion 33
    buildToolsVersion "30.0.3"

    defaultConfig {
        applicationId "com.sovereignnote.core"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 6
        versionName "1.5.0"
        multiDexEnabled true

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    flavorDimensions "channel"
    productFlavors {
        modernAndroid13 {
            dimension "channel"
            applicationIdSuffix ".modern13"
            targetSdkVersion 33
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        sharpR2 {
            dimension "channel"
            applicationIdSuffix ".sharp"
            targetSdkVersion 28
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        legacyAndroid6 {
            dimension "channel"
            applicationIdSuffix ".legacy"
            targetSdkVersion 23
            ndk {
                abiFilters "armeabi-v7a"
            }
        }
        nokiaN1 {
            dimension "channel"
            applicationIdSuffix ".nokia"
            targetSdkVersion 22
            ndk {
                abiFilters "x86"
            }
        }
    }

    sourceSets {
        modernAndroid13 {
            java.srcDirs = ['src/geckoview/java']
            res.srcDirs = ['src/geckoview/res']
        }
        sharpR2 {
            java.srcDirs = ['src/geckoview/java']
            res.srcDirs = ['src/geckoview/res']
        }
        legacyAndroid6 {
            java.srcDirs = ['src/geckoview/java']
            res.srcDirs = ['src/geckoview/res']
        }
        nokiaN1 {
            java.srcDirs = ['src/geckoview/java']
            res.srcDirs = ['src/geckoview/res']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    
    // 基础骨架引入标准多架构全量包（去除 -stable 尾缀）
    implementation 'org.mozilla.geckoview:geckoview:130.0.20240829141703'
}

// 🌟 终极去毒机制：强行修正全渠道的混淆重定向名
configurations.all { configuration ->
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'org.mozilla.geckoview') {
            // 无论是旧的 geckoview-armeabi-v7a，还是误设的 geckoview-stable
            // 只要不是纯净的 'geckoview'，统一暴力修正为官方唯一的全量构件名称
            if (details.requested.name != 'geckoview') {
                details.useTarget("org.mozilla.geckoview:geckoview:${details.requested.version}")
            }
        }
    }
}
