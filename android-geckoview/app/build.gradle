apply plugin: 'com.android.application'

repositories {
    maven { url "https://maven.mozilla.org/maven2/" }
    google()
    maven { url "https://maven.aliyun.com/repository/google" }
    maven { url "https://maven.aliyun.com/repository/public" }
    mavenCentral()
}

android {
    compileSdkVersion 30
    buildToolsVersion "30.0.3"

    defaultConfig {
        applicationId "com.sovereignnote.core"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 4
        versionName "1.4.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    flavorDimensions "engine"
    productFlavors {
        geckoview {
            dimension "engine"
            applicationIdSuffix ".geckoview"
        }
        systemwebview {
            dimension "engine"
            applicationIdSuffix ".systemwebview"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    
    // GeckoView multi-architecture support (only for GeckoView flavor)
    geckoviewImplementation 'org.mozilla.geckoview:geckoview-stable-armeabi-v7a:70.0.0.20191016161047'
    geckoviewImplementation 'org.mozilla.geckoview:geckoview-stable-arm64-v8a:70.0.0.20191016161047'
    geckoviewImplementation 'org.mozilla.geckoview:geckoview-stable-x86:70.0.0.20191016161047'
    geckoviewImplementation 'org.mozilla.geckoview:geckoview-stable-x86_64:70.0.0.20191016161047'
}
