apply plugin: 'com.android.application'

repositories {
    maven { url "https://maven.mozilla.org/maven2/" }
    google()
    maven { url "https://maven.aliyun.com/repository/google" }
    maven { url "https://maven.aliyun.com/repository/public" }
    mavenCentral()
}

android {
    compileSdkVersion 33
    buildToolsVersion "30.0.3"

    defaultConfig {
        applicationId "com.sovereignnote.core"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 5
        versionName "1.4.1"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    flavorDimensions "engine", "abi"
    productFlavors {
        geckoview {
            dimension "engine"
            applicationIdSuffix ".geckoview"
        }
        systemwebview {
            dimension "engine"
            applicationIdSuffix ".systemwebview"
        }

        arm64 {
            dimension "abi"
            ndk {
                abiFilters "arm64-v8a"
            }
        }
        arm32 {
            dimension "abi"
            ndk {
                abiFilters "armeabi-v7a"
            }
        }
        x86 {
            dimension "abi"
            ndk {
                abiFilters "x86"
            }
        }
        x86_64 {
            dimension "abi"
            ndk {
                abiFilters "x86_64"
            }
        }
        universal {
            dimension "abi"
            ndk {
                abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    
    // GeckoView 115 standard support (Split by target architecture flavor to completely bypass capabilities conflicts in Gradle)
    geckoviewArm64Implementation 'org.mozilla.geckoview:geckoview-arm64-v8a:115.0.20230710165010'
    geckoviewArm32Implementation 'org.mozilla.geckoview:geckoview-armeabi-v7a:115.0.20230710165010'
    geckoviewX86Implementation 'org.mozilla.geckoview:geckoview-x86:115.0.20230710165010'
    geckoviewX86_64Implementation 'org.mozilla.geckoview:geckoview-x86_64:115.0.20230710165010'
}
