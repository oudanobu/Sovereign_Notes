apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    buildToolsVersion "30.0.3"

    defaultConfig {
        applicationId "com.sovereignnote.core"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 4
        versionName "1.4.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
    
    // GeckoView multi-architecture support
    implementation 'org.mozilla.geckoview:geckoview-stable-armeabi-v7a:70.0.0'
    implementation 'org.mozilla.geckoview:geckoview-stable-arm64-v8a:70.0.0'
    implementation 'org.mozilla.geckoview:geckoview-stable-x86:70.0.0'
    implementation 'org.mozilla.geckoview:geckoview-stable-x86_64:70.0.0'
}
